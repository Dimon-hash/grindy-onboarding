<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Grindy loader screen">
  <defs>
    <clipPath id="screen-clip">
      <rect width="390" height="844" rx="40" ry="40"/>
    </clipPath>
    <filter id="island-shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#ffffff" flood-opacity="0.07"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="logo-shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="0" flood-color="#c6dfff" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g clip-path="url(#screen-clip)">
    <rect width="390" height="844" fill="#0056F9"/>

    <text x="32" y="33" fill="#050505"
          font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">12.27</text>

    <rect x="135" y="12" width="120" height="32" rx="16" fill="#000000" filter="url(#island-shadow)"/>
    <circle cx="239" cy="28" r="8" fill="#050505" opacity="0.42"/>

    <g fill="#050505">
      <rect x="281" y="25" width="3" height="6" rx="1.5"/>
      <rect x="287" y="22" width="3" height="9" rx="1.5"/>
      <rect x="293" y="19" width="3" height="12" rx="1.5"/>
      <rect x="299" y="16" width="3" height="15" rx="1.5"/>
    </g>

    <g fill="none" stroke="#050505" stroke-width="2.6" stroke-linecap="round">
      <path d="M310 21.5c4.9-3.8 12.2-3.8 17.1 0"/>
      <path d="M314 26c2.7-2.1 6.4-2.1 9.1 0"/>
      <path d="M318.5 30.3h.1"/>
    </g>

    <g>
      <rect x="332" y="22" width="21" height="10" rx="3.5" fill="#050505"/>
      <rect x="354" y="25" width="1.5" height="4" rx="0.75" fill="#050505" opacity="0.5"/>
      <rect x="345" y="23" width="7" height="8" rx="2.5" fill="#ffffff" opacity="0.1"/>
    </g>

    <g filter="url(#logo-shadow)">
      <text x="195" y="442"
            fill="#ffffff"
            text-anchor="middle"
            font-family="Impact, Arial Black, Helvetica, sans-serif"
            font-size="56"
            font-style="italic"
            font-weight="900"
            letter-spacing="-4.2"
            transform="skewX(-9 195 422)">GRINDY</text>
    </g>

    <rect x="134" y="831" width="134" height="5" rx="2.5" fill="#ffffff"/>
  </g>
<!-- grindy-hide-native-mock-top --><rect x="0" y="0" width="390" height="96" fill="#0056F9"/><!-- /grindy-hide-native-mock-top -->
</svg>
